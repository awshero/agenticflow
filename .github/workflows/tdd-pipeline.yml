name: TDD Pipeline

on:
  workflow_dispatch:
    inputs:
      jira_id:
        description: 'Jira ticket ID (e.g. PROJ-1)'
        required: true
        type: string
      jira_summary:
        description: 'Jira ticket summary'
        required: true
        type: string

jobs:
  # ─────────────────────────────────────────────
  # Stage 4 & 5: Run tests and validate coverage
  # (Stages 1-3 run in Copilot agent mode locally)
  # ─────────────────────────────────────────────
  test-and-coverage:
    name: "Run Tests & Validate Coverage"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          pytest tests/ -v \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=90 \
            --tb=short

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  # ─────────────────────────────────────────────
  # Lint check
  # ─────────────────────────────────────────────
  lint:
    name: "Lint Check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install linting tools
        run: pip install flake8

      - name: Run flake8
        run: flake8 src/ tests/ --max-line-length=88 --extend-ignore=E203,W503

  # ─────────────────────────────────────────────
  # Stage 8: Open PR (runs after tests pass)
  # ─────────────────────────────────────────────
  open-pr:
    name: "Open Pull Request"
    runs-on: ubuntu-latest
    needs: [test-and-coverage, lint]
    if: github.ref != 'refs/heads/develop' && github.ref != 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get test summary
        id: test_summary
        run: |
          pip install -r requirements.txt -q
          RESULT=$(pytest tests/ -q --tb=no --cov=src --cov-report=term-missing 2>&1 | tail -5)
          echo "summary<<EOF" >> $GITHUB_OUTPUT
          echo "$RESULT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ github.ref_name }}"
          JIRA_ID="${{ github.event.inputs.jira_id || 'PROJ-1' }}"
          SUMMARY="${{ github.event.inputs.jira_summary || 'Get country capital API' }}"

          gh pr create \
            --base develop \
            --head "$BRANCH" \
            --title "${JIRA_ID}: ${SUMMARY}" \
            --body "$(cat <<EOF
          ## Jira Ticket
          **${JIRA_ID}** — ${SUMMARY}

          ## TDD Pipeline Results
          \`\`\`
          ${{ steps.test_summary.outputs.summary }}
          \`\`\`

          ## API Contract
          \`\`\`
          GET /countries/{country_name}/capital
          200: {"country": str, "capital": str}
          404: {"detail": "Country not found: {name}"}
          400: {"detail": "Invalid country name"}

          GET /health
          200: {"status": "healthy"}
          \`\`\`

          ## How to Test
          \`\`\`bash
          pip install -r requirements.txt
          pytest tests/ -v
          uvicorn src.main:app --reload
          curl http://localhost:8000/countries/France/capital
          \`\`\`

          ## TDD Checklist
          - [x] Tests written first (RED phase — via TDD Orchestrator agent)
          - [x] All tests passing (GREEN phase — via Feature Developer agent)
          - [x] Coverage >= 90%
          - [x] API standards followed
          - [x] README-TEST-SCENARIOS.md updated
          - [x] Conventional commit format
          EOF
          )" || echo "PR may already exist"
